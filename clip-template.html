<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Clip — {{SLUG}}</title>

<!-- Open Graph (Discord, Slack, etc.) -->
<meta property="og:type" content="video.other">
<meta property="og:title" content="Clip — {{SLUG}}">
<meta property="og:url" content="{{URL}}">
<meta property="og:video" content="https://{{DOMAIN}}/{{SLUG}}/{{FILENAME}}">
<meta property="og:video:type" content="video/mp4">
<meta property="og:video:width" content="1920">
<meta property="og:video:height" content="1080">
<meta property="og:image" content="https://{{DOMAIN}}/{{SLUG}}/thumb.jpg">

<!-- Twitter/X card -->
<meta name="twitter:card" content="player">
<meta name="twitter:title" content="Clip — {{SLUG}}">
<meta name="twitter:player" content="{{URL}}">
<meta name="twitter:player:width" content="1920">
<meta name="twitter:player:height" content="1080">
<meta name="twitter:image" content="https://{{DOMAIN}}/{{SLUG}}/thumb.jpg">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#c0c0c0;font-family:monospace;display:flex;flex-direction:column;align-items:center;min-height:100vh}
video{max-width:100%;max-height:85vh;margin-top:2vh;border:1px solid #1a1a2e;border-radius:4px}
.info{margin:1rem;font-size:.85rem;color:#606080}
.info a{color:#7070a0;text-decoration:none}
.info a:hover{text-decoration:underline}
</style>
</head>
<body>
<video controls autoplay loop playsinline>
<source src="/{{SLUG}}/{{FILENAME}}" type="video/mp4">
</video>
<div class="info">
<a href="/{{SLUG}}/{{FILENAME}}" download>download</a>
</div>
</body>
</html>
